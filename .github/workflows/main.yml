name: 100% Automated iOS App Build

on:
  push:
    branches: [ "main" ] # মেইন ব্রাঞ্চে পুশ করলেই বিল্ড পাইপলাইন চালু হবে
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14 # আইফোন ১৫ প্রো ম্যাক্স সাপোর্ট করার জন্য ম্যাক ওএস রানার

    steps:
      # ১. গিটহাব রিপোজিটরি থেকে ভিডিও এবং ওয়ার্কফ্লো ফাইল রানারে নিয়ে আসা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. প্রফেশনাল টুল 'XcodeGen' ইনস্টল করা (যা xcodeproj ফাইল তৈরি করবে)
      - name: Install XcodeGen via Homebrew
        run: brew install xcodegen

      # ৩. অ্যাপের সোর্স কোড রাখার জন্য ফোল্ডার তৈরি করা
      - name: Create Project Directories
        run: mkdir -p BestApp

      # ৪. ডাইনামিকভাবে অ্যাপের মেইন গেটওয়ে (BestAppApp.swift) ফাইল তৈরি
      - name: Auto-Generate BestAppApp.swift
        run: |
          cat << 'EOF' > BestApp/BestAppApp.swift
          import SwiftUI

          @main
          struct BestAppApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

      # ۵. ডাইনামিকভাবে সম্পূর্ণ ভিডিও ইন্টারফেস এবং সিকোয়েন্স অ্যানিমেশন কোড (ContentView.swift) তৈরি
      - name: Auto-Generate ContentView.swift
        run: |
          cat << 'EOF' > BestApp/ContentView.swift
          import SwiftUI
          import AVKit

          struct ContentView: View {
              @State private var hasStartedAnimation = false
              @State private var redWhiteCircleScale: CGFloat = 0
              @State private var whiteCircleScale: CGFloat = 0
              @State private var redCircleScale: CGFloat = 0
              @State private var showText: Bool = false
              
              @State private var player: AVPlayer? = {
                  if let url = Bundle.main.url(forResource: "appVideo", withExtension: "mp4") {
                      return AVPlayer(url: url)
                  }
                  return nil
              }()

              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()
                      
                      if !hasStartedAnimation {
                          ZStack {
                              if let player = player {
                                  VideoPlayer(player: player)
                                      .disabled(true)
                                      .ignoresSafeArea()
                                      .onAppear {
                                          player.play()
                                          NotificationCenter.default.addObserver(forName: .AVPlayerItemDidPlayToEndTime, object: player.currentItem, queue: .main) { _ in
                                              player.seek(to: .zero)
                                              player.play()
                                          }
                                      }
                              } else {
                                  Text("ভিডিও ফাইলটি লোড করা যায়নি।")
                                      .foregroundColor(.gray)
                              }
                              
                              VBox {
                                  Spacer()
                                  Button(action: {
                                      player?.pause()
                                      withAnimation {
                                          hasStartedAnimation = true
                                      }
                                      executeAnimationSequence()
                                  }) {
                                      Text("ট্যাপ টু স্টার্ট")
                                          .font(.system(size: 22, weight: .bold, design: .rounded))
                                          .foregroundColor(.white)
                                          .padding(.vertical, 16)
                                          .padding(.horizontal, 45)
                                          .background(
                                              Capsule()
                                                  .fill(Color.red.opacity(0.85))
                                                  .shadow(color: .red.opacity(0.4), radius: 10, x: 0, y: 5)
                                          )
                                  }
                                  .padding(.bottom, 60)
                              }
                          }
                      } else {
                          ZStack {
                              Circle()
                                  .fill(RadialGradient(colors: [.red, .white], center: .center, startRadius: 10, endRadius: 150))
                                  .scaleEffect(redWhiteCircleScale)
                                  .frame(width: 400, height: 400)
                              
                              Circle()
                                  .fill(Color.white)
                                  .scaleEffect(whiteCircleScale)
                                  .frame(width: 400, height: 400)
                              
                              Circle()
                                  .fill(Color.red)
                                  .scaleEffect(redCircleScale)
                                  .frame(width: 400, height: 400)
                              
                              if showText {
                                  Text("ইউ আর বেস্ট")
                                      .font(.system(size: 46, weight: .black, design: .rounded))
                                      .foregroundColor(.white)
                                      .shadow(radius: 12)
                                      .transition(.scale.combined(with: .opacity))
                              }
                          }
                      }
                  }
              }
              
              private func executeAnimationSequence() {
                  withAnimation(.easeInOut(duration: 1.0)) {
                      redWhiteCircleScale = 3.5
                  }
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.8) {
                      withAnimation(.easeInOut(duration: 1.0)) {
                          whiteCircleScale = 3.5
                      }
                  }
                  DispatchQueue.main.asyncAfter(deadline: .now() + 1.6) {
                      withAnimation(.easeInOut(duration: 1.0)) {
                          redCircleScale = 3.5
                      }
                  }
                  DispatchQueue.main.asyncAfter(deadline: .now() + 2.4) {
                      withAnimation(.spring(response: 0.6, dampingFraction: 0.5, blendDuration: 0)) {
                          showText = true
                      }
                  }
              }
          }
          EOF

      # ৬. ফিক্সড স্টেপ: XcodeGen-কে অবজেক্ট ফরম্যাট ডাউনগ্রেড করার নির্দেশ দেওয়া
      - name: Generate Xcode Project Structure using XcodeGen
        run: |
          cat << 'EOF' > project.yml
          name: BestApp
          options:
            bundleIdPrefix: com.autogen
            minimumXcodeVersion: "15.0" # 👈 এই ম্যাজিক লাইনটি এক্সকোড ১৫-এর রিডেবল ফরম্যাট (Object Version 56) তৈরি করবে
          targets:
            BestApp:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources: [BestApp]
              settings:
                GENERATE_INFOPLIST_FILE: YES
                CODE_SIGNING_ALLOWED: NO
                CODE_SIGNING_REQUIRED: NO
                CODE_SIGN_IDENTITY: ""
                PROVISIONING_PROFILE_SPECIFIER: ""
          EOF
          xcodegen generate

      # ৭. রানারে থাকা নিশ্চিত এবং স্টেবল এক্সকোড ১৫.৪ এনভায়রনমেন্ট সেটআপ করা
      - name: Set up Xcode Version (Xcode 15.4)
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # ৮. ডাউনগ্রেডেড ফরম্যাটের এক্সকোড প্রজেক্ট বিল্ড করা
      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild clean build \
            -project BestApp.xcodeproj \
            -scheme BestApp \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos

      # ⑨. ভিডিও এসেটটি বান্ডেলে ইনজেক্ট করা এবং ফাইনাল Unsigned IPA প্যাকেজ তৈরি করা
      - name: Inject Video and Package IPA
        run: |
          if [ -f "appVideo.mp4" ]; then
            cp appVideo.mp4 build/Release-iphoneos/BestApp.app/
            echo "Success: appVideo.mp4 injected smoothly!"
          else
            echo "Warning: appVideo.mp4 not found."
          fi
          
          mkdir -p build/Payload
          cp -R build/Release-iphoneos/BestApp.app build/Payload/
          cd build
          zip -r BestApp.ipa Payload

      # ১০. গিটহাব অ্যাকশনস থেকে ফাইনাল IPA ফাইলটি ডাউনলোডের জন্য রেডি করা
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BestApp-Fixed-Automated-Unsigned
          path: build/BestApp.ipa
          retention-days: 7
